<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Options</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .btn {
            display: inline-block;
            width: 200px;
            padding: 15px;
            margin: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .call-btn { background-color: #28a745; }
        .call-btn:hover { background-color: #218838; }
        .email-btn { background-color: #007bff; }
        .email-btn:hover { background-color: #0069d9; }
    </style>
</head>
